name: Deploy MkDocs Documentation to GitHub Pages

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python runtime
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install MkDocs and Material Theme dependencies
        run: |
          pip install mkdocs mkdocs-material

      - name: Build static documentation site
        run: mkdocs build

      - name: Setup GitHub Pages configuration
        uses: actions/configure-pages@v4

      - name: Upload static site artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Publish to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
