site_name: "Todo List — Gerenciador de Tarefas"
site_description: "Documentação do projeto Todo List com arquitetura MVC e Spec-Driven Development."
site_author: "Allicia"

theme:
  name: material
  language: pt-BR
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Modo escuro
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/weather-night
        name: Modo claro
  font:
    text: Inter
    code: Roboto Mono
  features:
    - navigation.instant
    - navigation.tracking
    - content.code.copy
    - search.suggest

nav:
  - Início: index.md
  - Arquitetura: architecture.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true
  - admonition
  - tables
