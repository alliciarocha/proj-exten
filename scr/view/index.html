<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Gerenciador de Tarefas — Todo List com arquitetura MVC, design Soft UI inspirado no Figma.">
    <title>Todo List — Gerenciador de Tarefas</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' viewBox='0 0 24 24' fill='none' stroke='%235851DB' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M22 11.08V12a10 10 0 1 1-5.93-9.14'/><polyline points='22 4 12 14.01 9 11.01'/></svg>">
</head>
<body>


<main class="main-wrapper">

    <!-- Frame holding calendar, tasks and filters -->
    <div class="main__frame">
        <!-- ===== SIDEBAR ===== -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar__header">
                <h2 class="sidebar__day" id="sidebar-day">Sunday</h2>
                <p class="sidebar__date" id="sidebar-date">04, April 2024</p>
            </div>

        <!-- Mini Calendar -->
        <div class="calendar" id="calendar">
            <div class="calendar__header">
                <span class="calendar__title" id="calendar-title">April</span>
                <div class="calendar__nav">
                    <button class="calendar__nav-btn" id="cal-prev" aria-label="Mês anterior">◂</button>
                    <button class="calendar__nav-btn" id="cal-next" aria-label="Próximo mês">▸</button>
                </div>
            </div>
            <div class="calendar__grid" id="calendar-grid">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- Stats -->
        <div class="stats">
            <div class="stat-card stat-card--done">
                <div class="stat-card__label">Concluídas</div>
                <div class="stat-card__value" id="stat-done">0</div>
            </div>
            <div class="stat-card stat-card--pending">
                <div class="stat-card__label">Pendentes</div>
                <div class="stat-card__value" id="stat-pending">0</div>
            </div>
        </div>
    </aside>

        <!-- ===== TASK CONTENT ===== -->
        <div class="task-content">
            <!-- Header Greeting -->
            <header class="header">
                <h1 class="header__greeting" id="greeting">
                    Olá, <strong>Allicia</strong><span>, comece a planejar hoje</span>
                </h1>
            </header>

            <!-- Add Task -->
        <form class="add-task" id="add-task-form" autocomplete="off">
            <div class="add-task__input-group">
                <input
                    type="text"
                    class="add-task__input"
                    id="task-title"
                    placeholder="Título da tarefa"
                    required
                    maxlength="120"
                    aria-label="Título da tarefa"
                >
                <input
                    type="text"
                    class="add-task__input"
                    id="task-desc"
                    placeholder="Detalhes da tarefa"
                    maxlength="300"
                    aria-label="Detalhes da tarefa"
                >
            </div>
            <div class="add-task__input-group" style="flex: 0 0 auto;">
                <input
                    type="datetime-local"
                    class="add-task__input"
                    id="task-reminder"
                    aria-label="Data e hora do lembrete"
                    title="Adicionar Lembrete"
                >
            </div>
            <button type="submit" class="add-task__btn" id="add-task-btn" aria-label="Adicionar tarefa">
                +
            </button>
        </form>

        <!-- Filters -->
        <div class="filters" id="filters">
            <button class="filters__pill filters__pill--active" data-filter="all" id="filter-all">
                Todas
            </button>
            <button class="filters__pill" data-filter="pending" id="filter-pending">
                Pendentes
            </button>
            <button class="filters__pill" data-filter="done" id="filter-done">
                Concluídas
            </button>
            <div class="filters__search">
                <i data-lucide="search" class="filters__search-icon"></i>
                <input
                    type="text"
                    class="filters__search-input"
                    id="search-input"
                    placeholder="Buscar tarefas"
                    aria-label="Buscar tarefas"
                >
            </div>
        </div>

        <!-- Task Grid -->
        <div class="task-grid" id="task-grid">
            <!-- Populated by JS -->
        </div>
        </div>
    </div>
</main>

<!-- Edit Modal -->
<div class="modal-overlay" id="edit-modal">
    <form class="modal" id="edit-form" autocomplete="off">
        <h2 class="modal__title">Editar Tarefa</h2>
        <div class="add-task__input-group" style="flex-direction: column; margin-bottom: 16px;">
            <input type="text" class="add-task__input" id="edit-task-title" placeholder="Título da tarefa" required maxlength="120">
            <input type="text" class="add-task__input" id="edit-task-desc" placeholder="Detalhes da tarefa" maxlength="300">
            <input type="datetime-local" class="add-task__input" id="edit-task-reminder" aria-label="Data e hora do lembrete" title="Adicionar Lembrete">
        </div>
        <div class="modal__actions">
            <button type="button" class="filters__pill" id="edit-cancel-btn">Cancelar</button>
            <button type="submit" class="filters__pill filters__pill--active">Salvar</button>
        </div>
    </form>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toast-container"></div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
